name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install web dependencies
        working-directory: apps/web
        run: npm install

      - name: Lint web app
        working-directory: apps/web
        run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm install

      - name: Install API dependencies
        working-directory: apps/api
        run: npm install

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Generate Prisma client for API
        working-directory: apps/api
        run: npx prisma generate --schema=../../prisma/schema.prisma

      - name: Type check API
        working-directory: apps/api
        run: npx tsc --noEmit

      - name: Install web dependencies
        working-directory: apps/web
        run: npm install

      - name: Type check web
        working-directory: apps/web
        run: npx tsc --noEmit

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm install

      - name: Install API dependencies
        working-directory: apps/api
        run: npm install

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Generate Prisma client for API
        working-directory: apps/api
        run: npx prisma generate --schema=../../prisma/schema.prisma

      - name: Build API
        working-directory: apps/api
        run: npm run build

      - name: Install web dependencies
        working-directory: apps/web
        run: npm install

      - name: Build web
        working-directory: apps/web
        run: npm run build
