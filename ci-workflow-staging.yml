# ============================================================
# MOVE THIS FILE TO: .github/workflows/ci.yml
# ============================================================
# The GitHub OAuth token used by automation does not have the
# 'workflow' scope needed to push directly to .github/workflows/.
# 
# To activate this CI pipeline:
#   mkdir -p .github/workflows && mv ci-workflow-staging.yml .github/workflows/ci.yml
# ============================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Type check
        run: npx tsc --noEmit --pretty

      - name: Build
        run: npm run build --if-present

      - name: Test
        run: npm test --if-present
